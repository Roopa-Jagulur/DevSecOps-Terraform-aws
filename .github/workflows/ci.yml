      - name: Ensure AWS env auth is used
        run: |
          unset AWS_PROFILE AWS_SHARED_CREDENTIALS_FILE AWS_CONFIG_FILE

      - name: Verify AWS identity (must succeed)
        run: |
          echo "AWS_ACCESS_KEY_ID set? -> ${AWS_ACCESS_KEY_ID:+yes}"
          echo "AWS_SECRET_ACCESS_KEY set? -> ${AWS_SECRET_ACCESS_KEY:+yes}"
          aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -out=tfplan