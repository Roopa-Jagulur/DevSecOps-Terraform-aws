name: Terraform Deployment
on: [push]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./eks-install

    env:
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      TF_IN_AUTOMATION: "true"

    steps:
      - uses: actions/checkout@v4

      # Read Vault creds into TEMP vars (NOT AWS_* yet)
      - name: Fetch AWS creds from Vault (temp vars)
        uses: hashicorp/vault-action@v3
        with:
          url: http://100.25.203.159:8200
          role: gh-actions-role
          method: jwt
          secrets: |
            aws/creds/terraform-role access_key | VAULT_AWS_ACCESS_KEY_ID ;
            aws/creds/terraform-role secret_key | VAULT_AWS_SECRET_ACCESS_KEY

      - name: Sanitize creds + force AWS SDK to use env creds
        shell: bash
        run: |
          # Clear anything that can override env creds
          unset AWS_SESSION_TOKEN
          unset AWS_PROFILE AWS_SHARED_CREDENTIALS_FILE AWS_CONFIG_FILE AWS_SDK_LOAD_CONFIG
          unset AWS_WEB_IDENTITY_TOKEN_FILE AWS_ROLE_ARN AWS_ROLE_SESSION_NAME
          rm -f ~/.aws/credentials ~/.aws/config || true

          # IMPORTANT: strip CR/LF so the secret doesn't include hidden characters
          AK="$(printf '%s' "${VAULT_AWS_ACCESS_KEY_ID}" | tr -d '\r\n')"
          SK="$(printf '%s' "${VAULT_AWS_SECRET_ACCESS_KEY}" | tr -d '\r\n')"

          # Export clean values for following steps
          echo "AWS_ACCESS_KEY_ID=$AK" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$SK" >> "$GITHUB_ENV"

          # Safe debug (no secrets)
          echo "AWS_ACCESS_KEY_ID prefix: ${AK:0:4}"

      - name: Verify AWS is using env creds (safe)
        shell: bash
        run: |
          aws --version
          aws configure list

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        run: terraform plan

      # - name: Terraform apply
      #   run: terraform apply -auto-approve
