name: Terraform Deployment

on:
  push:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./eks-install

    env:
      VAULT_ADDR: http://100.25.203.159:8200
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      TF_IN_AUTOMATION: "true"
      AWS_PROFILE: vault
      AWS_SDK_LOAD_CONFIG: "1"
      AWS_SHARED_CREDENTIALS_FILE: /home/runner/.aws/credentials
      AWS_CONFIG_FILE: /home/runner/.aws/config

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Vault login (JWT)
        id: vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ env.VAULT_ADDR }}
          role: gh-actions-role
          method: jwt
          outputToken: true

      - name: Install jq
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq

      - name: Fetch AWS creds from Vault and write AWS profile
        shell: bash
        run: |
          set -euo pipefail

          # Disable any other auth mechanism that could interfere
          unset AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
          unset AWS_WEB_IDENTITY_TOKEN_FILE AWS_ROLE_ARN AWS_ROLE_SESSION_NAME

          mkdir -p ~/.aws

          json="$(curl -sS -H "X-Vault-Token: ${{ steps.vault.outputs.vault_token }}" \
            "${VAULT_ADDR}/v1/aws/creds/terraform-role")"

          AK="$(echo "$json" | jq -r '.data.access_key' | tr -d '\r\n')"
          SK="$(echo "$json" | jq -r '.data.secret_key' | tr -d '\r\n')"

          cat > ~/.aws/credentials <<EOF
          [vault]
          aws_access_key_id = $AK
          aws_secret_access_key = $SK
          EOF

          cat > ~/.aws/config <<EOF
          [profile vault]
          region = ${AWS_REGION}
          output = json
          EOF

          echo "Wrote ~/.aws/credentials and ~/.aws/config for profile: vault"
          echo "Access key prefix: ${AK:0:4}"
          echo "Secret length: ${#SK} (should be 40)"
            
      - name: Show which Vault instance CI is using (safe)
        shell: bash
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq
          echo "Vault sys/health:"
          curl -sS "${VAULT_ADDR}/v1/sys/health" | jq -r '.version, .cluster_name, .cluster_id'

      - name: Print Access Key ID used by profile (TEMP debug)
        shell: bash
        run: |
          # This prints ONLY the access key id (not the secret).
          # Remove this step after debugging and rotate keys.
          grep -E 'aws_access_key_id' ~/.aws/credentials | sed 's/.*= *//'

      - name: Verify AWS identity (profile)
        shell: bash
        run: |
          aws --version
          aws configure list --profile vault
          aws sts get-caller-identity --profile vault

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init (forced profile)
        env:
          AWS_PROFILE: vault
          AWS_REGION: us-east-1
          AWS_DEFAULT_REGION: us-east-1
          AWS_SDK_LOAD_CONFIG: "1"
          AWS_SHARED_CREDENTIALS_FILE: /home/runner/.aws/credentials
          AWS_CONFIG_FILE: /home/runner/.aws/config
          AWS_WEB_IDENTITY_TOKEN_FILE: ""
          AWS_ROLE_ARN: ""
        run: terraform init

      - name: Terraform plan (forced profile)
        env:
          AWS_PROFILE: vault
          AWS_REGION: us-east-1
          AWS_DEFAULT_REGION: us-east-1
          AWS_SDK_LOAD_CONFIG: "1"
          AWS_SHARED_CREDENTIALS_FILE: /home/runner/.aws/credentials
          AWS_CONFIG_FILE: /home/runner/.aws/config
          AWS_WEB_IDENTITY_TOKEN_FILE: ""
          AWS_ROLE_ARN: ""
        run: terraform plan

      # Uncomment when ready:
      # - name: Terraform apply
      #   env:
      #     AWS_PROFILE: vault
      #     AWS_REGION: us-east-1
      #     AWS_DEFAULT_REGION: us-east-1
      #     AWS_SDK_LOAD_CONFIG: "1"
      #     AWS_SHARED_CREDENTIALS_FILE: /home/runner/.aws/credentials
      #     AWS_CONFIG_FILE: /home/runner/.aws/config
      #     AWS_WEB_IDENTITY_TOKEN_FILE: ""
      #     AWS_ROLE_ARN: ""
      #   run: terraform apply -auto-approve
