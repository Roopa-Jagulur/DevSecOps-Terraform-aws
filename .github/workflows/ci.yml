name: Terraform Deployment
#on: [push]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./eks-install

    env:
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      TF_IN_AUTOMATION: "true"
      VAULT_ADDR: http://100.25.203.159:8200

    steps:
      - uses: actions/checkout@v4

      - name: Vault login (JWT)
        id: vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ env.VAULT_ADDR }}
          role: gh-actions-role
          method: jwt
          outputToken: true

      - name: Identify which Vault instance CI is using (safe)
        shell: bash
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq
          echo "Vault sys/health:"
          curl -sS "$VAULT_ADDR/v1/sys/health" | jq -r '.version, .cluster_name, .cluster_id'

      - name: Fetch AWS creds via Vault API (clean export)
        shell: bash
        run: |
          set -euo pipefail

          unset AWS_SESSION_TOKEN
          unset AWS_PROFILE AWS_SHARED_CREDENTIALS_FILE AWS_CONFIG_FILE AWS_SDK_LOAD_CONFIG
          unset AWS_WEB_IDENTITY_TOKEN_FILE AWS_ROLE_ARN AWS_ROLE_SESSION_NAME
          rm -f ~/.aws/credentials ~/.aws/config || true

          json="$(curl -sS -H "X-Vault-Token: ${{ steps.vault.outputs.vault_token }}" \
            "$VAULT_ADDR/v1/aws/creds/terraform-role")"

          AK="$(echo "$json" | jq -r '.data.access_key')"
          SK="$(echo "$json" | jq -r '.data.secret_key')"

          AK="$(printf '%s' "$AK" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          SK="$(printf '%s' "$SK" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          echo "AWS_ACCESS_KEY_ID=$AK" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$SK" >> "$GITHUB_ENV"

          echo "AWS_ACCESS_KEY_ID prefix: ${AK:0:4}"
          echo "Secret length: ${#SK} (should be 40)"

      - name: Verify AWS is using env creds (safe)
        shell: bash
        run: |
          aws configure list

      # TEMP DEBUG (remove after you check in IAM)
      - name: Print Access Key ID (temporary debug)
        run: echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID"

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - uses: hashicorp/setup-terraform@v3
      - run: terraform init
      - run: terraform plan
