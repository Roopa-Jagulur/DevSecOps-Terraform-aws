name: Terraform Deployment
on: [push]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./eks-install

    env:
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      TF_IN_AUTOMATION: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Fetch AWS creds from Vault (iam_user)
        uses: hashicorp/vault-action@v3
        with:
          url: http://100.25.203.159:8200
          role: gh-actions-role
          method: jwt
          secrets: |
            aws/creds/terraform-role access_key | AWS_ACCESS_KEY_ID ;
            aws/creds/terraform-role secret_key | AWS_SECRET_ACCESS_KEY

      - name: Force AWS SDK to use Vault env creds
        shell: bash
        run: |
          # Remove anything that can override env creds
          unset AWS_SESSION_TOKEN
          unset AWS_PROFILE
          unset AWS_SHARED_CREDENTIALS_FILE
          unset AWS_CONFIG_FILE
          unset AWS_SDK_LOAD_CONFIG
          unset AWS_WEB_IDENTITY_TOKEN_FILE
          unset AWS_ROLE_ARN
          unset AWS_ROLE_SESSION_NAME

          # Remove local aws config/credentials if present
          rm -f ~/.aws/credentials ~/.aws/config || true

          # Safe debug
          echo "AWS_ACCESS_KEY_ID prefix: ${AWS_ACCESS_KEY_ID:0:4}"
          aws configure list

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        run: terraform plan

      # - name: Terraform apply
      #   run: terraform apply -auto-approve
